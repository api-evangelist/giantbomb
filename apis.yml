apis:
  - aid: giantbomb:giantbomb-api
    name: Giant Bomb API
    description: >-
      The Giant Bomb API provides RESTful access to the Giant Bomb video game database, covering
      games, characters, companies, concepts, franchises, genres, locations, objects, people,
      platforms, releases, reviews, themes, videos, and more. Authentication is via an API key
      passed as a query parameter. Responses are available in JSON or XML format.
